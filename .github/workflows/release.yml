name: Release

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write 
  
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_PAT }}

      # ----------------------------------------------- #
      # NPM PUBLISHING                                  #
      # ----------------------------------------------- #
      - name: Setup Node.js for NPM
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Copy README for NPM
        run: cp README.md packages/npm/README.md

      - name: Publish to NPM
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version
          npm publish --access public

      # ----------------------------------------------- #
      # PIP (PYPI) PUBLISHING                           #
      # ----------------------------------------------- #
      - name: Set up Python for PyPI
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Copy README for PyPI
        run: cp README.md packages/python/README.md

      - name: Publish wrapper to PyPI
        working-directory: packages/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip build twine
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/version=.*/version=\"$VERSION\",/" setup.py
          python -m build
          twine upload dist/*
